info:
  name: Get user by ID
  type: http
  seq: 1
  tags:
    - Users

http:
  method: GET
  url: "{{baseUrl}}/users/:id"
  params:
    - name: id
      value: 01H8R5X7X9Y2Z4W6V8T0S1Q2R
      type: path
      description: User's unique identifier
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: User retrieved successfully
    request:
      url: "{{baseUrl}}/users/:id"
      method: GET
      params:
        - name: id
          value: 01H8R5X7X9Y2Z4W6V8T0S1Q2R
          type: path
          description: User's unique identifier
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""
  - name: 404 Response
    description: User not found
    request:
      url: "{{baseUrl}}/users/:id"
      method: GET
      params:
        - name: id
          value: 01H8R5X7X9Y2Z4W6V8T0S1Q2R
          type: path
          description: User's unique identifier
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "INVALID_CREDENTIALS",
            "message": "The provided credentials are invalid",
            "details": {}
          }
  - name: 500 Response
    description: Internal server error
    request:
      url: "{{baseUrl}}/users/:id"
      method: GET
      params:
        - name: id
          value: 01H8R5X7X9Y2Z4W6V8T0S1Q2R
          type: path
          description: User's unique identifier
    response:
      status: 500
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "INVALID_CREDENTIALS",
            "message": "The provided credentials are invalid",
            "details": {}
          }
  - name: 503 Response
    description: Service Temporarily Unavailable or Degraded
    request:
      url: "{{baseUrl}}/users/:id"
      method: GET
      params:
        - name: id
          value: 01H8R5X7X9Y2Z4W6V8T0S1Q2R
