info:
  name: Confirm user registration
  type: http
  seq: 2
  tags:
    - Authentication

http:
  method: GET
  url: "{{baseUrl}}/authn/confirm"
  params:
    - name: token
      value: ""
      type: query
      description: Confirmation token sent to the user's email
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: User successfully confirmed
    request:
      url: "{{baseUrl}}/authn/confirm"
      method: GET
      params:
        - name: token
          value: ""
          type: query
          description: Confirmation token sent to the user's email
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "Operation completed successfully"
          }
  - name: 400 Response
    description: Invalid or missing token
    request:
      url: "{{baseUrl}}/authn/confirm"
      method: GET
      params:
        - name: token
          value: ""
          type: query
          description: Confirmation token sent to the user's email
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "INVALID_CREDENTIALS",
            "message": "The provided credentials are invalid",
            "details": {}
          }
  - name: 410 Response
    description: Token expired
    request:
      url: "{{baseUrl}}/authn/confirm"
      method: GET
      params:
        - name: token
          value: ""
          type: query
          description: Confirmation token sent to the user's email
    response:
      status: 410
      statusText: Gone
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "INVALID_CREDENTIALS",
            "message": "The provided credentials are invalid",
            "details": {}
          }
  - name: 500 Response
    description: Internal server error
    request:
      url: "{{baseUrl}}/authn/confirm"
      method: GET
      params:
        - name: token
          value: ""
          type: query
          description: Confirmation token sent to the user's email
    response:
      status: 500
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "INVALID_CREDENTIALS",
            "message": "The provided credentials are invalid",
            "details": {}
          }
  - name: 503 Response
    description: Service Temporarily Unavailable or Degraded
    request:
      url: "{{baseUrl}}/authn/confirm"
      method: GET
      params:
        - name: token
          value: ""
          type: query
          description: Confirmation token sent to the user's email
    response:
      status: 503
      statusText: Service Unavailable
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "INVALID_CREDENTIALS",
            "message": "The provided credentials are invalid",
            "details": {}
          }

docs: Confirms a user's email address using a confirmation token
