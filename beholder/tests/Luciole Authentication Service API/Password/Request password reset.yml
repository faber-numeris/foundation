info:
  name: Request password reset
  type: http
  seq: 1
  tags:
    - Password

http:
  method: POST
  url: "{{baseUrl}}/authn/password/reset-request"
  body:
    type: json
    data: |-
      {
        "email": "user@example.com"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 202 Response
    description: Password reset email sent
    request:
      url: "{{baseUrl}}/authn/password/reset-request"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "user@example.com"
          }
    response:
      status: 202
      statusText: Accepted
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "Operation completed successfully"
          }
  - name: 400 Response
    description: Invalid request data
    request:
      url: "{{baseUrl}}/authn/password/reset-request"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "user@example.com"
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "INVALID_CREDENTIALS",
            "message": "The provided credentials are invalid",
            "details": {}
          }
  - name: 404 Response
    description: User not found
    request:
      url: "{{baseUrl}}/authn/password/reset-request"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "user@example.com"
          }
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "INVALID_CREDENTIALS",
            "message": "The provided credentials are invalid",
            "details": {}
          }
  - name: 429 Response
    description: Too many requests
    request:
      url: "{{baseUrl}}/authn/password/reset-request"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "user@example.com"
          }
    response:
      status: 429
      statusText: Too Many Requests
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "INVALID_CREDENTIALS",
            "message": "The provided credentials are invalid",
            "details": {}
          }
  - name: 500 Response
    description: Internal server error
    request:
      url: "{{baseUrl}}/authn/password/reset-request"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "user@example.com"
          }
    response:
      status: 500
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "INVALID_CREDENTIALS",
            "message": "The provided credentials are invalid",
            "details": {}
          }
  - name: 503 Response
    description: Service Temporarily Unavailable or Degraded
    request:
      url: "{{baseUrl}}/authn/password/reset-request"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "user@example.com"
          }
    response:
      status: 503
      statusText: Service Unavailable
