info:
  name: Readiness check
  type: http
  seq: 2
  tags:
    - Healthcheck

http:
  method: GET
  url: "{{baseUrl}}/ready"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Readiness check successful
    request:
      url: "{{baseUrl}}/ready"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": "UP"
          }
  - name: 503 Response
    description: Service Temporarily Unavailable or Degraded
    request:
      url: "{{baseUrl}}/ready"
      method: GET
    response:
      status: 503
      statusText: Service Unavailable
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "INVALID_CREDENTIALS",
            "message": "The provided credentials are invalid",
            "details": {}
          }

docs: Returns 200 OK if all critical services are healthy, 503 Service Unavailable otherwise.
