info:
  name: User logout
  type: http
  seq: 5

http:
  method: POST
  url: "{{baseUrl}}/authn/logout"
  headers:
    - name: Accept
      value: application/json
  auth:
    type: bearer
    token: "{{bearerToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Invalidates the current user's access token
